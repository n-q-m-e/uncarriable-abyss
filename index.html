<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>uncarriable abyss</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
</script>

<!-- ══════ Water Vertex Shader ══════ -->
<script id="waterVert" type="x-shader/x-vertex">
precision highp float;

uniform float uTime;

varying vec3 vWorldPos;
varying vec3 vNormal;
varying float vFogDepth;
varying float vWaveHeight;

void gerstner(vec3 origin, vec2 dir, float t, float steep, float amp, float wl,
              inout vec3 pos, inout vec3 norm) {
    float k = 6.28318 / wl;
    float spd = sqrt(9.81 / k) * 0.25;
    float phase = k * dot(dir, origin.xz) - spd * t;
    float c = cos(phase);
    float s = sin(phase);
    pos.x += steep * amp * dir.x * c;
    pos.y += amp * s;
    pos.z += steep * amp * dir.y * c;
    norm.x -= dir.x * k * amp * c;
    norm.z -= dir.y * k * amp * c;
    norm.y -= steep * k * amp * s;
}

void main() {
    vec3 pos = position;
    vec3 norm = vec3(0.0, 1.0, 0.0);

    gerstner(position, normalize(vec2(0.9, 0.3)),  uTime, 0.60, 0.65, 28.0, pos, norm);
    gerstner(position, normalize(vec2(-0.2, 1.0)), uTime, 0.50, 0.40, 18.0, pos, norm);
    gerstner(position, normalize(vec2(0.5, -0.7)), uTime, 0.42, 0.22, 12.0, pos, norm);
    gerstner(position, normalize(vec2(-0.7, 0.4)), uTime, 0.30, 0.14,  8.0, pos, norm);

    vNormal = normalize(norm);
    vWaveHeight = pos.y - position.y;
    vWorldPos = (modelMatrix * vec4(pos, 1.0)).xyz;

    vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
    vFogDepth = length(mvPos.xyz);
    gl_Position = projectionMatrix * mvPos;
}
</script>

<!-- ══════ Water Fragment Shader ══════ -->
<script id="waterFrag" type="x-shader/x-fragment">
precision highp float;

uniform float uTime;
uniform vec3 uCameraPos;
uniform vec3 uSunDir;
uniform vec3 uSunColor;
uniform vec3 uSkyTop;
uniform vec3 uSkyHorizon;
uniform vec3 uWaterDeep;
uniform vec3 uWaterMid;
uniform vec3 uFogColor;
uniform float uFogNear;
uniform float uFogFar;

varying vec3 vWorldPos;
varying vec3 vNormal;
varying float vFogDepth;
varying float vWaveHeight;

// ─── Noise ───
float hash(vec2 p) {
    vec3 p3 = fract(vec3(p.xyx) * 0.1031);
    p3 += dot(p3, p3.yzx + 33.33);
    return fract((p3.x + p3.y) * p3.z);
}

float vnoise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(mix(hash(i), hash(i + vec2(1,0)), f.x),
               mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
}

// ─── Detail normal — 2 scrolling layers (optimized) ───
vec3 detailNormal(vec2 p, float t) {
    float e = 0.03;
    vec2 a = p * 3.0 + vec2(t * 0.02, t * 0.015);
    vec2 b = p * 8.0 + vec2(-t * 0.018, t * 0.025);

    float s1 = 0.55, s2 = 0.35;
    float h  = vnoise(a)*s1 + vnoise(b)*s2;
    float hx = vnoise(a+vec2(e,0.))*s1 + vnoise(b+vec2(e,0.))*s2;
    float hz = vnoise(a+vec2(0.,e))*s1 + vnoise(b+vec2(0.,e))*s2;

    return normalize(vec3(-(hx-h)/e * 0.25, 1.0, -(hz-h)/e * 0.25));
}

// ─── Caustics — animated light patterns under surface ───
float caustic(vec2 p, float t) {
    float c1 = vnoise(p * 5.0 + vec2(t * 0.03, t * 0.02));
    float c2 = vnoise(p * 5.0 + vec2(-t * 0.025, t * 0.035) + 4.3);
    return pow(1.0 - abs(c1 - c2), 4.0);
}

// ─── Sky color for reflections ───
vec3 skyColor(vec3 dir) {
    float y = max(dir.y, 0.0);
    vec3 sky = mix(uSkyHorizon, uSkyTop, pow(y, 0.4));
    float sd = max(dot(dir, uSunDir), 0.0);
    sky += uSunColor * pow(sd, 4.0) * 0.35;
    sky += vec3(1.0, 0.6, 0.3) * pow(sd, 2.0) * 0.1 * (1.0 - y);
    return sky;
}

void main() {
    vec3 V = normalize(uCameraPos - vWorldPos);

    // Detail ripples + micro-waves on top of wave normals
    vec3 detN = detailNormal(vWorldPos.xz * 0.05, uTime);
    vec3 N = normalize(vNormal + (detN - vec3(0.0, 1.0, 0.0)) * 1.0);

    // ─── Fresnel ───
    float NdotV = max(dot(N, V), 0.0);
    float fresnel = 0.02 + 0.98 * pow(1.0 - NdotV, 5.0);

    // ─── Reflection ───
    vec3 R = reflect(-V, N);
    vec3 refl = skyColor(R);

    // ─── Water body — richer turquoise ───
    float hf = smoothstep(-0.4, 0.5, vWaveHeight);
    vec3 waterBody = mix(uWaterDeep, uWaterMid, hf);

    // Depth patches
    float depthVar = vnoise(vWorldPos.xz * 0.015 + 5.0) * 0.6
                   + vnoise(vWorldPos.xz * 0.04) * 0.3;
    waterBody = mix(waterBody, waterBody * 1.5 + vec3(0.0, 0.06, 0.05), depthVar * 0.3);

    // ─── Caustics — animated light patterns in the water ───
    float caust = caustic(vWorldPos.xz * 0.04, uTime);
    // Caustics visible in troughs, fading on crests
    float caustMask = (1.0 - smoothstep(-0.1, 0.3, vWaveHeight)) * (1.0 - fresnel);
    waterBody += vec3(0.05, 0.12, 0.10) * caust * caustMask * 0.8;

    // SSS — light through crests, more turquoise
    float sss = pow(max(dot(V, -uSunDir + N * 0.4), 0.0), 3.0);
    waterBody += vec3(0.0, 0.40, 0.32) * sss * 0.45;

    // Texture variation
    float tex = vnoise(vWorldPos.xz * 0.4 + uTime * 0.02) * 0.15;
    waterBody *= 0.92 + tex;

    // Diffuse
    float diff = max(dot(N, uSunDir), 0.0);
    waterBody *= 0.4 + diff * 0.6;

    // ─── Composite ───
    vec3 color = mix(waterBody, refl, fresnel);

    // ─── Sun specular — extended sun path ───
    vec3 H = normalize(uSunDir + V);
    float NdotH = max(dot(N, H), 0.0);
    color += uSunColor * pow(NdotH, 500.0) * 1.0;
    color += uSunColor * pow(NdotH, 8.0) * 0.06;
    color += uSunColor * pow(NdotH, 50.0) * 0.08;

    // ─── Foam — wispy trails on crests ───
    float foamBase = smoothstep(0.15, 0.45, vWaveHeight);
    float foamNoise1 = vnoise(vec2(vWorldPos.x * 1.5, vWorldPos.z * 5.0) + uTime * 0.04);
    float foamNoise2 = vnoise(vec2(vWorldPos.x * 3.0 + 7.0, vWorldPos.z * 8.0) - uTime * 0.03);
    float foamNoise3 = vnoise(vWorldPos.xz * 12.0 + uTime * 0.06);
    float foamPattern = foamNoise1 * 0.6 + foamNoise2 * 0.3 + foamNoise3 * 0.1;
    float foam = foamBase * smoothstep(0.28, 0.55, foamPattern);
    foam *= smoothstep(0.0, 0.15, foam);
    vec3 foamColor = vec3(0.88, 0.92, 0.95);
    color = mix(color, foamColor, foam * 0.45);

    // ─── Distance fog — matches sky horizon for seamless blend ───
    float fogFactor = smoothstep(uFogNear, uFogFar, vFogDepth);
    fogFactor = fogFactor * fogFactor;
    // Use sky horizon color directly so water merges with sky at distance
    vec3 hazeColor = uSkyHorizon;
    color = mix(color, hazeColor, fogFactor);

    // Tone map
    color = color / (color + 0.7) * 1.15;

    gl_FragColor = vec4(color, 1.0);
}
</script>

<!-- ══════ Sky with procedural clouds ══════ -->
<script id="skyVert" type="x-shader/x-vertex">
varying vec3 vDir;
void main() {
    vDir = position;
    vec4 pos = projectionMatrix * mat4(mat3(viewMatrix)) * vec4(position, 1.0);
    gl_Position = pos.xyww;
}
</script>

<script id="skyFrag" type="x-shader/x-fragment">
precision highp float;
uniform vec3 uSkyTop, uSkyHorizon, uSunDir, uSunColor;
uniform float uTime;
varying vec3 vDir;

float hash(vec2 p) {
    vec3 p3 = fract(vec3(p.xyx) * 0.1031);
    p3 += dot(p3, p3.yzx + 33.33);
    return fract((p3.x + p3.y) * p3.z);
}

float vnoise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    return mix(mix(hash(i), hash(i + vec2(1,0)), f.x),
               mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
}

// ─── Procedural clouds — FBM ───
float fbm(vec2 p, float t) {
    float f = 0.0;
    f += 0.50 * vnoise(p * 1.0 + t * 0.008);
    f += 0.25 * vnoise(p * 2.0 - t * 0.012);
    f += 0.125 * vnoise(p * 4.0 + t * 0.006);
    f += 0.0625 * vnoise(p * 8.0 - t * 0.01);
    return f;
}

void main() {
    vec3 dir = normalize(vDir);
    float y = max(dir.y, 0.0);
    vec3 sky = mix(uSkyHorizon, uSkyTop, pow(y, 0.4));

    // Sun
    float sd = max(dot(dir, uSunDir), 0.0);
    sky += vec3(1.0, 0.65, 0.3) * pow(sd, 2.5) * 0.10;
    sky += uSunColor * pow(sd, 6.0) * 0.25;
    sky += vec3(1.0, 0.97, 0.9) * pow(sd, 1500.0) * 2.0;
    sky += vec3(0.9, 0.4, 0.25) * pow(sd, 3.0) * (1.0 - y) * 0.08;

    // ─── Procedural clouds ───
    if (dir.y > 0.01) {
        // Project ray onto a cloud plane at height
        vec2 cloudUv = dir.xz / (dir.y + 0.1) * 3.0;
        float cloud = fbm(cloudUv, uTime);
        // Shape clouds — threshold and soften
        cloud = smoothstep(0.42, 0.7, cloud);
        // Fade clouds near horizon to avoid hard cut
        float horizonFade = smoothstep(0.01, 0.15, dir.y);
        cloud *= horizonFade;
        // Cloud color — lit by sun
        float cloudLight = 0.7 + 0.3 * max(dot(dir, uSunDir), 0.0);
        vec3 cloudColor = vec3(0.95, 0.95, 0.97) * cloudLight;
        // Slight warm tint on sun-facing side
        cloudColor += uSunColor * pow(sd, 3.0) * 0.15;
        sky = mix(sky, cloudColor, cloud * 0.55);
    }

    // Below horizon
    if (dir.y < 0.0) sky = mix(sky, uSkyHorizon * 0.75, smoothstep(0.0, -0.2, dir.y));

    gl_FragColor = vec4(sky, 1.0);
}
</script>

<!-- ══════ Post-process: grain + vignette + god rays ══════ -->
<script id="postVert" type="x-shader/x-vertex">
varying vec2 vUv;
void main() {
    vUv = uv;
    gl_Position = vec4(position, 1.0);
}
</script>

<script id="postFrag" type="x-shader/x-fragment">
precision highp float;
uniform sampler2D uTexture;
uniform float uTime;
uniform vec2 uResolution;
uniform vec2 uSunScreenPos;
varying vec2 vUv;

float hash(vec2 p) {
    vec3 p3 = fract(vec3(p.xyx) * 0.1031);
    p3 += dot(p3, p3.yzx + 33.33);
    return fract((p3.x + p3.y) * p3.z);
}

void main() {
    vec3 color = texture2D(uTexture, vUv).rgb;

    // ─── God rays — lightweight radial blur from sun ───
    vec2 sunUv = uSunScreenPos;
    vec2 deltaUv = (vUv - sunUv) * 0.02;
    vec2 sampleUv = vUv;
    float godray = 0.0;
    for (int i = 0; i < 8; i++) {
        sampleUv -= deltaUv;
        float lum = dot(texture2D(uTexture, sampleUv).rgb, vec3(0.3, 0.5, 0.2));
        godray += lum;
    }
    godray /= 8.0;
    float sunDist = length(vUv - sunUv);
    float rayMask = smoothstep(0.7, 0.0, sunDist);
    color += vec3(1.0, 0.92, 0.7) * godray * rayMask * 0.08;

    // ─── Film grain ───
    float grain = hash(vUv * uResolution + fract(uTime * 3.7) * 100.0);
    grain = (grain - 0.5) * 0.02;
    color += grain;

    // ─── Vignette ───
    vec2 uv = vUv * 2.0 - 1.0;
    float vig = 1.0 - dot(uv * 0.5, uv * 0.5);
    vig = smoothstep(0.0, 1.0, vig);
    color *= 0.88 + vig * 0.12;

    gl_FragColor = vec4(color, 1.0);
}
</script>

<script type="module">
import * as THREE from 'three';

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
document.body.appendChild(renderer.domElement);

const rtParams = { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, format: THREE.RGBAFormat };
let renderTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, rtParams);

const scene = new THREE.Scene();
const postScene = new THREE.Scene();
const postCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 2000);

// ─── Sun ───
const baseSunAngle = 0.16;
const sunDir = new THREE.Vector3();
const sunColor = new THREE.Color();
const skyTop = new THREE.Color();
const skyHorizon = new THREE.Color();

function updateSun(t) {
    const elevation = baseSunAngle + t * 0.0003;
    const clampedElev = Math.min(elevation, 0.45);
    sunDir.set(0.3, clampedElev, -0.8).normalize();

    const warmth = Math.min(t * 0.0005, 1.0);
    sunColor.setRGB(1.0, 0.90 + warmth * 0.03, 0.62 + warmth * 0.08);
    skyTop.setRGB(0.18 + warmth * 0.05, 0.42 + warmth * 0.06, 0.82 + warmth * 0.04);
    skyHorizon.setRGB(0.72 + warmth * 0.06, 0.72 + warmth * 0.06, 0.78 + warmth * 0.06);
}
updateSun(0);

// ─── Sky ───
const skyUniforms = {
    uSkyTop: { value: skyTop }, uSkyHorizon: { value: skyHorizon },
    uSunDir: { value: sunDir }, uSunColor: { value: sunColor },
    uTime: { value: 0 },
};
scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(900, 32, 16),
    new THREE.ShaderMaterial({
        uniforms: skyUniforms,
        vertexShader: document.getElementById('skyVert').textContent,
        fragmentShader: document.getElementById('skyFrag').textContent,
        side: THREE.BackSide, depthWrite: false,
    })
));

// ─── Ocean ───
const waterGeo = new THREE.PlaneGeometry(800, 800, 150, 150);
waterGeo.rotateX(-Math.PI / 2);

const waterMat = new THREE.ShaderMaterial({
    uniforms: {
        uTime:       { value: 0 },
        uCameraPos:  { value: camera.position },
        uSunDir:     { value: sunDir },
        uSunColor:   { value: sunColor },
        uSkyTop:     { value: skyTop },
        uSkyHorizon: { value: skyHorizon },
        // Richer turquoise palette
        uWaterDeep:  { value: new THREE.Color(0.005, 0.06, 0.14) },
        uWaterMid:   { value: new THREE.Color(0.02, 0.22, 0.30) },
        uFogColor:   { value: new THREE.Color(0.72, 0.74, 0.80) },
        uFogNear:    { value: 70.0 },
        uFogFar:     { value: 250.0 },
    },
    vertexShader: document.getElementById('waterVert').textContent,
    fragmentShader: document.getElementById('waterFrag').textContent,
});
scene.add(new THREE.Mesh(waterGeo, waterMat));

// ─── Post-process ───
const sunScreenPos = new THREE.Vector2();
const postMat = new THREE.ShaderMaterial({
    uniforms: {
        uTexture:      { value: renderTarget.texture },
        uTime:         { value: 0 },
        uResolution:   { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
        uSunScreenPos: { value: sunScreenPos },
    },
    vertexShader: document.getElementById('postVert').textContent,
    fragmentShader: document.getElementById('postFrag').textContent,
    depthTest: false,
});
postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), postMat));

// ─── Compute sun screen position for god rays ───
const sunWorldPos = new THREE.Vector3();
function updateSunScreenPos() {
    sunWorldPos.copy(sunDir).multiplyScalar(500).add(camera.position);
    sunWorldPos.project(camera);
    sunScreenPos.set(sunWorldPos.x * 0.5 + 0.5, sunWorldPos.y * 0.5 + 0.5);
}

// ─── Resize ───
window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    renderTarget.setSize(w, h);
    postMat.uniforms.uResolution.value.set(w, h);
});

// ─── Loop ───
const clock = new THREE.Clock();
const basePos = new THREE.Vector3(0, 5.5, 0);
const lookTarget = new THREE.Vector3();

(function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    updateSun(t);
    updateSunScreenPos();

    waterMat.uniforms.uTime.value = t;
    skyUniforms.uTime.value = t;
    postMat.uniforms.uTime.value = t;

    // Gentle camera drift
    camera.position.x = basePos.x + Math.sin(t * 0.04) * 0.5;
    camera.position.y = basePos.y + Math.sin(t * 0.06) * 0.12;
    camera.position.z = basePos.z + Math.cos(t * 0.03) * 0.3;

    lookTarget.set(
        Math.sin(t * 0.02) * 2.0,
        -1.5 + Math.sin(t * 0.035) * 0.15,
        -60 + Math.cos(t * 0.025) * 1.5
    );
    camera.lookAt(lookTarget);

    renderer.setRenderTarget(renderTarget);
    renderer.render(scene, camera);
    renderer.setRenderTarget(null);
    renderer.render(postScene, postCamera);
})();
</script>

</body>
</html>
